name: Build Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # Generate the gradle-wrapper.jar at build time so we don't need to
      # commit the binary. Gradle 8.9 is pulled from the distributions server.
      - name: Bootstrap Gradle Wrapper
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Generate wrapper files
        run: gradle wrapper --gradle-version=8.9 --distribution-type=bin

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK to FocusLock.apk
        run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/FocusLock.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: FocusLock-debug
          path: app/build/outputs/apk/debug/FocusLock.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "FocusLock Build ${{ github.run_number }}"
          body: |
            Debug APK built from commit ${{ github.sha }}.

            **Install steps:**
            1. Download `FocusLock.apk` below
            2. On your Android phone go to Settings → Install unknown apps → Browser → Allow
            3. Open the downloaded APK and install
          files: app/build/outputs/apk/debug/FocusLock.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
